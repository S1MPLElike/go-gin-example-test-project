name: API Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:5.7
        env:
          MYSQL_ROOT_PASSWORD: "187415157"
          MYSQL_DATABASE: blog
        ports:
          - 3306:3306
        options: >-
          --health-cmd "mysqladmin ping -h localhost"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: 拉取代码
        uses: actions/checkout@v4

      - name: 安装 Go
        uses: actions/setup-go@v5
        with:
          go-version-file: 'go-gin-example/go.mod'

      - name: 安装 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.14'

      - name: 安装依赖 + 初始化数据库 + 启动服务 + 跑测试
        run: |
          set -e

          # 装 mysql-client，导入建表 SQL
          sudo apt-get update -qq && sudo apt-get install -y -qq mysql-client
          mysql -h 127.0.0.1 -u root -p187415157 blog < go-gin-example/docs/sql/blog.sql

          # 装 Python 依赖
          pip install -r requestment.txt

          # 后台启动 Go 服务
          cd go-gin-example
          GOFLAGS=-mod=vendor nohup go run main.go > /tmp/server.log 2>&1 &
          cd ..

          # 等 Go 服务启动，最多等 20 秒
          STARTED=false
          for i in $(seq 1 10); do
            if curl -s http://127.0.0.1:8000/auth > /dev/null 2>&1; then
              echo "Go 服务已启动"
              STARTED=true
              break
            fi
            echo "等待服务启动... ($i/10)"
            sleep 2
          done

          # 如果服务没起来，打印日志帮助排查
          if [ "$STARTED" = false ]; then
            echo "=== Go 服务启动失败，打印 server.log ==="
            cat /tmp/server.log
            exit 1
          fi

          # 跑测试
          pytest --tb=short

      - name: 上传 Allure 报告
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-results
          path: allure-results/
